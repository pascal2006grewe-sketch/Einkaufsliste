<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einkaufsliste</title>
    // Design der Seite: zentrierter Inhalt, einfache Schriftart und volle Breite der Input-Felder
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
    </style>

</head>
<body>
    <h1>Einkaufsliste</h1>
    // Container für alle Input-Felder, in dem die Artikel eingegeben werden
    <div id="inputContainer">
        // Erstes Input-Feld zum Eingeben von Artikeln
        <input type="text" placeholder="Artikel" class="artikel-input">
    </div>

    <script>
        // Hole den Container mit der ID "inputContainer" aus dem HTML
        const container = document.getElementById('inputContainer');

        // Höre auf "keypress"-Ereignisse (Tastenanschläge) im Container
        container.addEventListener('keypress', function(event) {
            // Prüfe, ob die gedrückte Taste "Enter" ist
            if (event.key === 'Enter') {
                // Verhindert Zeilenumbruch im Input)
                event.preventDefault();
                
                // Erstelle ein neues Input-Element, wenn Eingabe = Enter
                const newInput = document.createElement('input');
                newInput.type = 'text';  // Typ: Textfeld
                newInput.placeholder = 'Artikel';  // Platzhalter-Text
                newInput.className = 'artikel-input';  // CSS-Klasse hinzufügen
                
                // Füge das neue Input-Feld zum Container hinzu
                container.appendChild(newInput);
                
                // Cursor springt ins nächste Input Feld
                newInput.focus();
            }
        });
    </script>
</body>
</html>
