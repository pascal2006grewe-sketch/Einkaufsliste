<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einkaufsliste</title>
    <!-- Design der Seite: zentrierter Inhalt, einfache Schriftart und volle Breite der Input-Felder -->
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin: 5px 0;
        }
        .artikel-input {
            flex: 1;
            padding: 8px;
            box-sizing: border-box;
        }
        .anzahl-input {
            width: 80px;
            padding: 8px;
            box-sizing: border-box;
        }
    </style>

</head>
<body>
    <h1>Einkaufsliste</h1>
    <!-- Container für alle Input-Felder, in dem die Artikel eingegeben werden -->
    <div id="inputContainer">
        <!-- Erste Reihe mit Artikel und Anzahl -->
        <div class="input-row">
            <input type="text" placeholder="Artikel" class="artikel-input">
            <input type="number" placeholder="Anzahl" class="anzahl-input" min="1" value="1">
        </div>
    </div>

    <script>
        // Hole den Container mit der ID "inputContainer" aus dem HTML
        const container = document.getElementById('inputContainer');

        // Höre auf "keypress"-Ereignisse (Tastenanschläge) im Container
        container.addEventListener('keypress', function(event) {
            // Prüfe, ob die gedrückte Taste "Enter" ist
            if (event.key === 'Enter') {
                // Verhindert Zeilenumbruch im Input
                event.preventDefault();
                
                // Erstelle eine neue Reihe (Zeile) für Artikel + Anzahl
                const newRow = document.createElement('div');
                newRow.className = 'input-row';
                
                // Erstelle das Artikel-Input-Feld
                const artikelInput = document.createElement('input');
                artikelInput.type = 'text';
                artikelInput.placeholder = 'Artikel';
                artikelInput.className = 'artikel-input';
                
                // Erstelle das Anzahl-Input-Feld
                const anzahlInput = document.createElement('input');
                anzahlInput.type = 'number';
                anzahlInput.placeholder = 'Anzahl';
                anzahlInput.className = 'anzahl-input';
                anzahlInput.min = '1';
                anzahlInput.value = '1';
                
                // Füge beide Felder zur neuen Reihe hinzu
                newRow.appendChild(artikelInput);
                newRow.appendChild(anzahlInput);
                
                // Füge die neue Reihe zum Container hinzu
                container.appendChild(newRow);
                
                // Cursor springt ins nächste Artikel-Input Feld
                artikelInput.focus();
            }
        });
    </script>
</body>
</html>
